appId: network.hathor.wallet
---

# ============================================================
# Wallet Creation E2E Flow
# ============================================================
# Navigates the full create-wallet flow:
#   WelcomeScreen -> InitialScreen -> NewWordsScreen ->
#   BackupWords (5 steps) -> ChoosePinScreen -> Wallet starts
#
# Prerequisites: app must be running on the WelcomeScreen.
# Run: maestro test .maestro/flows/walletCreation.yaml
# ============================================================

# ------ Step 1: WelcomeScreen ------
- assertVisible: "Welcome to Hathor Wallet!"

- tapOn:
    id: "terms-agreement-switch"

- tapOn:
    id: "welcome-start-button"

# ------ Step 2: InitialScreen ------
- extendedWaitUntil:
    visible: "To start,"
    timeout: 10000

- tapOn: "NEW WALLET"

# ------ Step 3: NewWordsScreen ------
- extendedWaitUntil:
    visible: "Your wallet has been created!"
    timeout: 10000

- copyTextFrom:
    id: "seed-words-data"
- runScript:
    file: ../scripts/captureWords.js

- tapOn: "NEXT"

# ------ Step 4: BackupWords (5 validation steps) ------
- extendedWaitUntil:
    visible: "Please select the word that corresponds to the number below:"
    timeout: 10000

- repeat:
    times: 5
    commands:
      - copyTextFrom:
          id: "backup-step-number"
      - runScript:
          file: ../scripts/lookupWord.js
      - tapOn: ${output.correctWord}

# ------ Step 4b: Success modal ------
- extendedWaitUntil:
    visible: "Words saved correctly"
    timeout: 10000
# Dismiss the modal by tapping the backdrop (top of screen)
- tapOn:
    point: "196,100"
- waitForAnimationToEnd

# ------ Step 5: ChoosePinScreen ------
- extendedWaitUntil:
    visible: "Create a new PIN code,"
    timeout: 15000

# Enter PIN 123456
- tapOn: "1"
- tapOn: "2"
- tapOn: "3"
- tapOn: "4"
- tapOn: "5"
- tapOn: "6"

# Confirm PIN
- extendedWaitUntil:
    visible: "To confirm the PIN,"
    timeout: 10000
- tapOn: "1"
- tapOn: "2"
- tapOn: "3"
- tapOn: "4"
- tapOn: "5"
- tapOn: "6"

# Start wallet
- tapOn: "START THE WALLET"

# ------ Step 6: Verify wallet started ------
- extendedWaitUntil:
    visible: "Tokens"
    timeout: 30000
